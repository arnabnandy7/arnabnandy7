name: Update Humour

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  update-humour:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install jq
        run: sudo apt-get install jq

      # Fetch data from your API
      - name: Fetch API data
        run: |
          RESPONSE=$(curl -sS -X GET "https://naas.isalman.dev/no" || true)

          if echo "$RESPONSE" | grep -qi "error code: 1033"; then
            echo "API limit reached, writing fallback JSON"
            printf '{"reason":"No humour available right now 😴"}' > tmp/humour_response.json
      
          elif echo "$RESPONSE" | jq -e . >/dev/null 2>&1; then
            printf '%s\n' "$RESPONSE" > tmp/humour_response.json
      
          else
            echo "Non-JSON response, wrapping it as reason"
            jq -Rn --arg reason "$RESPONSE" '{reason:$reason}' > tmp/humour_response.json
          fi
          
      - name: Commit
        run: |
            if git diff --exit-code; then
              echo "No changes to commit."
              exit 0
            else
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add .
              git commit -m "update"
              git push origin main
            fi
